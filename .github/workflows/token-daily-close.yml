name: Daily Token Close
on:
  schedule:
    - cron: '55 23 * * *'  # 23:55 cada día
  workflow_dispatch:       # permite ejecutar manualmente

jobs:
  close-daily:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Token Daily Close
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .github/scripts/token-daily-close.ps1

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/reports/token-usage-daily-aggregate.md .github/reports/token-usage-history.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: daily token usage close for $(date -u +'%Y-%m-%d')"
          git push
